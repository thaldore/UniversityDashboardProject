version: '3.8'
services:
  db:
    image: postgres:16
    container_name: university-postgres
    restart: always
    environment:
      POSTGRES_USER: university
      POSTGRES_PASSWORD: university123
      POSTGRES_DB: universitydb
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  seq:
    image: datalust/seq:latest
    environment:
      ACCEPT_EULA: Y
    ports:
      - "5341:80"
    volumes:
      - seq_data:/data

  backend:
    build:
      context: ../src/Presentation/WebApi/UniversityDashboard.WebApi
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=universitydb;Username=university;Password=university123"
      Seq__ServerUrl: "http://seq:80"
    ports:
      - "5000:8080"
    depends_on:
      - db
      - seq

  frontend:
    build:
      context: ../src/Presentation/frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  db_data:
  seq_data:
